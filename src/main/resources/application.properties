# ---- Application ----
spring.application.name=trimzo
server.port=8080

# ---- Database: H2 in-memory (dev) ----
spring.datasource.url=jdbc:h2:mem:trimzo;DB_CLOSE_DELAY=-1;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
#spring.datasource.password=

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# ---- Run schema.sql (creates the short_code_seq sequence) ----
spring.sql.init.mode=always

# ---- H2 web console (browse the DB in your browser) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Logging ----
logging.level.com.trimzo=DEBUG

# ---- JWT ----
trimzo.jwt.secret=aVeryLongRandomSecretKeyThatIsAtLeast32BytesLongForHS256Security
trimzo.jwt.expiration-ms=3600000